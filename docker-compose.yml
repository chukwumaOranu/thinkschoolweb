services:
  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_NAME:-thinkschool_web}
      MYSQL_USER: ${DB_USER:-thinkschool_web}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    ports:
      - "${MYSQL_HOST_PORT:-3307}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data

  server:
    build:
      context: ./server
    restart: unless-stopped
    env_file:
      - ${SERVER_ENV_FILE:-./server/.env.development}
    environment:
      PORT: 5000
      DB_HOST: mysql
      REDIS_HOST: redis
      CLIENT_URL: ${CLIENT_URL:-http://localhost:5173}
    ports:
      - "${SERVER_HOST_PORT:-5001}:5000"
    volumes:
      - ./server/uploads:/app/uploads
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:5001}
    ports:
      - "5173:5173"
    depends_on:
      - server

volumes:
  mysql_data:
  redis_data:
